<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="h3 mb-0 text-gray-800">
      <i class="bi bi-chat-quote-fill text-primary me-2"></i> Feedback Analysis Report
    </h2>
    <span class="badge bg-primary-subtle text-primary rounded-pill px-3 py-2">
      Page {{ currentPage }} / {{ totalPages }}
    </span>
  </div>

  <div class="feedback-timeline">
    <div *ngFor="let f of feedbacks" class="card mb-4 shadow-sm border-0 position-relative">
      <div class="position-absolute top-0 start-0 bottom-0 rounded-start" 
           [ngClass]="{
             'bg-success': f.sentiment === 'positive',
             'bg-danger': f.sentiment === 'negative',
             'bg-warning': f.sentiment === 'neutral'
           }"
           style="width: 6px;"></div>

      <div class="card-body ps-4 ms-2">
        <div class="d-flex justify-content-between align-items-start mb-3">
          <div>
            <span class="badge bg-dark rounded-pill me-2">
              <i class="bi bi-globe me-1"></i>{{ f.language | uppercase }}
            </span>
            <span class="badge text-uppercase" 
                  [ngClass]="{
                    'bg-success-subtle text-success': f.sentiment === 'positive',
                    'bg-danger-subtle text-danger': f.sentiment === 'negative',
                    'bg-warning-subtle text-dark': f.sentiment === 'neutral'
                  }">
              <i class="bi" 
                 [ngClass]="{
                   'bi-emoji-smile': f.sentiment === 'positive',
                   'bi-emoji-frown': f.sentiment === 'negative',
                   'bi-emoji-neutral': f.sentiment === 'neutral'
                 }"></i>
              {{ f.sentiment }}
            </span>
          </div>
          <small class="text-muted">
            <i class="bi bi-calendar3 me-1"></i>
            {{ f.createdAt | date:'short' }}
          </small>
        </div>
        
        <div class="row">
          <div class="col-md-6 border-end">
            <h6 class="text-muted mb-2 text-uppercase fw-bold small">Original Feedback</h6>
            <p class="card-text mb-0">{{ f.text }}</p>
          </div>
          <div class="col-md-6">
            <h6 class="text-muted mb-2 text-uppercase fw-bold small">English Translation</h6>
            <p class="card-text text-primary mb-0 fw-medium"><em>{{ f.translatedText }}</em></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-center align-items-center mt-5 mb-5 gap-3">
    <button class="btn btn-outline-dark px-4" 
            [disabled]="currentPage === 1"
            (click)="goToPage(currentPage - 1)">
      <i class="bi bi-arrow-left me-2"></i>Previous
    </button>
    
    <button class="btn btn-outline-dark px-4"                
            [disabled]="currentPage === totalPages"
            (click)="goToPage(currentPage + 1)">
      Next<i class="bi bi-arrow-right ms-2"></i>
    </button>
  </div>
  <div class="container mt-4">
  <div class="mb-3">
    <button class="btn btn-outline-primary" routerLink="/">
      <i class="bi bi-arrow-left me-2"></i>Back to Home
    </button>
  </div>
</div>
